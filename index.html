<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FESA Control Center V5</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <!-- Aurora Background -->
    <div class="aurora-bg"></div>

    <!-- Navbar -->
    <nav class="glass-navbar">
        <div class="nav-container">
            <div class="logo">
                <i class="fas fa-shield-alt"></i>
                <span>FESA <span class="v5">V5</span></span>
            </div>
            
            <div class="nav-menu">
                <a href="#" class="nav-link active"><i class="fas fa-home"></i> Dashboard</a>
                <a href="#" class="nav-link"><i class="fas fa-brain"></i> AI Center</a>
                <a href="#" class="nav-link"><i class="fas fa-tools"></i> Tools</a>
                <a href="#" class="nav-link"><i class="fas fa-chart-bar"></i> Analytics</a>
            </div>

            <div class="nav-right">
                <button id="command-btn" class="command-btn">
                    <i class="fas fa-search"></i> Ctrl + K
                </button>
                <div class="api-status">
                    <span class="status-dot online"></span>
                    <span>4 Active</span>
                </div>
                <i class="fas fa-bell notification-icon"></i>
                <div class="user-avatar">
                    <i class="fas fa-user-circle fa-2x"></i>
                </div>
            </div>
        </div>
    </nav>

    <div class="dashboard">
        <h1 class="main-heading">Welcome to FESA Control Center</h1>
        <p class="sub-heading">Ultra Premium • Futuristic • Secure</p>

        <!-- Globe Area -->
        <div class="globe-container">
            <div class="globe" id="globe">🌍</div>
        </div>

        <div class="content-grid">
            <!-- AI Status -->
            <div class="glass-card">
                <h3>AI Status</h3>
                <div class="status online">● ONLINE</div>
                <p>Response: <strong>67ms</strong></p>
            </div>

            <!-- Quick Tools -->
            <div class="glass-card">
                <h3>Quick Tools</h3>
                <div class="tools-preview">
                    FB Downloader • TikTok • TTS • AI Chat
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/app.js"></script>
</body>
                  </html>
